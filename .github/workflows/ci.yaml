name: CI
on: [ push, pull_request, workflow_dispatch ]
jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    steps:
      -
        uses: actions/checkout@v6
        with:
          submodules: recursive
      -
        name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'
      -
        name: Build Libra Fortune Parent
        run: ./gradlew --no-daemon --stacktrace clean build
        working-directory: Libra-Fortune-Api/
      -
        name: Prepare backend artifact
        run: |
          mkdir -p build/artifacts/backend
          find libra-fortune-api/build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-plain.jar' -exec cp {} build/artifacts/backend/ \;
        working-directory: Libra-Fortune-Api/
      -
        name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: backend
          path: Libra-Fortune-Api/build/artifacts/backend/*.jar
          retention-days: 7
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    env:
      working-directory: Libra-Fortune-Web-V2/
    steps:
      -
        uses: actions/checkout@v6
      -
        name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest
      -
        name: Use Node.js 26
        uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'pnpm'
          cache-dependency-path: 'Libra-Fortune-Web-V2/pnpm-lock.yaml'
      -
        name: Dependency
        run: pnpm install --frozen-lockfile
        working-directory: ${{env.working-directory}}
      -
        name: Lint
        run: pnpm lint
        working-directory: ${{env.working-directory}}
      # -
      #   name: Test
      #   run: pnpm test
      #   working-directory: ${{env.working-directory}}
      -
        name: Build
        run: pnpm build
        working-directory: ${{env.working-directory}}
      -
        name: Prepare frontend artifact
        run: tar -czf frontend.tar.gz -C dist .
        working-directory: ${{env.working-directory}}
      -
        name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend
          path: Libra-Fortune-Web-V2/frontend.tar.gz
          retention-days: 7
  docker:
    name: docker
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:  
      -
        uses: actions/checkout@v6
      -
        name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: scripts/docker/
      -
        name: Prepare docker artifacts
        run: mv scripts/docker/frontend/frontend.tar.gz scripts/docker/frontend.tar.gz
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to GitHub Packages
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/kuretru/libra-fortune
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: scripts/docker/
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  purge-images:
    name: purge images
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Purge untagged docker images
        uses: Chizkiyahu/delete-untagged-ghcr-action@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: ${{ github.repository }}
          repository_owner: ${{ github.repository_owner }}
          package_name: libra-fortune
          untagged_only: true
          except_untagged_multiplatform: true
          owner_type: user
